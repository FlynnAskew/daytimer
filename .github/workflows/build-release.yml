# GitHub Actions workflow to build & publish DayTimer
# Runs whenever you push a new git tag like "v4.0.0" or trigger it manually.

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # allows running manually from the Actions tab

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inject Supabase config from secrets
        shell: pwsh
        run: |
          $content = @"
const SUPABASE_CONFIG = {
  url: '$env:SUPABASE_URL',
  anonKey: '$env:SUPABASE_ANON_KEY'
};
module.exports = SUPABASE_CONFIG;
"@
          Set-Content -Path "src/supabase-config.js" -Value $content
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Inject Microsoft config (optional)
        shell: pwsh
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
        run: |
          if ($env:MS_CLIENT_ID -and $env:MS_CLIENT_ID -ne '') {
            $content = @"
          const MS_CONFIG = {
            clientId: '$env:MS_CLIENT_ID',
            redirectUri: 'http://localhost:3000/auth-callback',
            scopes: ['Tasks.ReadWrite', 'User.Read', 'offline_access']
          };
          module.exports = MS_CONFIG;
          "@
            Set-Content -Path "src/ms-config.js" -Value $content
          }

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build & publish to GitHub Releases
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
