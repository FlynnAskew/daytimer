# GitHub Actions workflow to build & publish DayTimer
# Runs whenever you push a new git tag like "v4.0.0" or trigger it manually.

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # allows running manually from the Actions tab

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inject Supabase config from secrets
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          $cfg = "const SUPABASE_CONFIG = { url: '$env:SUPABASE_URL', anonKey: '$env:SUPABASE_ANON_KEY' }; module.exports = SUPABASE_CONFIG;"
          Set-Content -Path "src/supabase-config.js" -Value $cfg

      - name: Inject Microsoft config (optional)
        shell: pwsh
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
        run: |
          if ($env:MS_CLIENT_ID -and $env:MS_CLIENT_ID -ne '') {
            $content = @"
          const MS_CONFIG = {
            clientId: '$env:MS_CLIENT_ID',
            redirectUri: 'http://localhost:3000/auth-callback',
            scopes: ['Tasks.ReadWrite', 'User.Read', 'offline_access']
          };
          module.exports = MS_CONFIG;
          "@
            Set-Content -Path "src/ms-config.js" -Value $content
          }

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build & publish to GitHub Releases
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-publish the draft release
        # electron-builder creates the release as a draft. Flip it to
        # published so auto-update clients can see it without a manual
        # click in the GitHub UI.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          TAG_REF:  ${{ github.ref_name }}
        run: |
          $headers = @{
            'Authorization' = "Bearer $env:GH_TOKEN"
            'Accept'        = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $rel = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$env:REPO/releases/tags/$env:TAG_REF"
          if ($rel.draft -eq $true) {
            Write-Host "Publishing draft release $($rel.tag_name) (id $($rel.id))"
            $body = @{ draft = $false; make_latest = 'true' } | ConvertTo-Json
            Invoke-RestMethod -Headers $headers -Method Patch -Body $body -ContentType 'application/json' `
              -Uri "https://api.github.com/repos/$env:REPO/releases/$($rel.id)" | Out-Null
            Write-Host "Release published."
          } else {
            Write-Host "Release already published, nothing to do."
          }
